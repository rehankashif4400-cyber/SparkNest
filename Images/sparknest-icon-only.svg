<svg width="200" height="200" viewBox="0 0 200 200" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>SparkNest — Icon Mark</title>
  <desc>SparkNest neural spark icon, standalone, transparent background</desc>

  <defs>
    <linearGradient id="iconG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5c3"/>
      <stop offset="100%" stop-color="#8b80ff"/>
    </linearGradient>
    <linearGradient id="ringG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5c3" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8b80ff" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="haloT" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5c3" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00e5c3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haloV" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b80ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#8b80ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- halos -->
  <ellipse cx="100" cy="100" rx="100" ry="100" fill="url(#haloT)"/>
  <ellipse cx="100" cy="100" rx="80" ry="80" fill="url(#haloV)"/>

  <!-- outer orbit ring -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#ringG)" stroke-width="1" stroke-dasharray="4 7"/>

  <!-- icon container -->
  <rect x="10" y="10" width="180" height="180" rx="46" fill="#0d1828" stroke="#1a2840" stroke-width="1.5"/>

  <!-- network edges -->
  <line x1="100" y1="100" x2="48" y2="44" stroke="#00e5c3" stroke-width="2" stroke-opacity="0.55"/>
  <line x1="100" y1="100" x2="154" y2="44" stroke="#00e5c3" stroke-width="2" stroke-opacity="0.45"/>
  <line x1="100" y1="100" x2="28" y2="112" stroke="#8b80ff" stroke-width="1.8" stroke-opacity="0.55"/>
  <line x1="100" y1="100" x2="172" y2="124" stroke="#8b80ff" stroke-width="1.8" stroke-opacity="0.45"/>
  <line x1="100" y1="100" x2="68" y2="160" stroke="#00e5c3" stroke-width="1.6" stroke-opacity="0.42"/>
  <line x1="100" y1="100" x2="142" y2="164" stroke="#8b80ff" stroke-width="1.6" stroke-opacity="0.38"/>
  <!-- cross connections -->
  <line x1="48" y1="44" x2="154" y2="44" stroke="#00e5c3" stroke-width="0.8" stroke-opacity="0.16"/>
  <line x1="28" y1="112" x2="68" y2="160" stroke="#8b80ff" stroke-width="0.8" stroke-opacity="0.14"/>
  <line x1="154" y1="44" x2="172" y2="124" stroke="#8b80ff" stroke-width="0.7" stroke-opacity="0.12"/>

  <!-- satellite nodes with glow rings -->
  <circle cx="48" cy="44" r="18" fill="#00e5c3" fill-opacity="0.08"/>
  <circle cx="48" cy="44" r="11" fill="#00e5c3" fill-opacity="0.95"/>

  <circle cx="154" cy="44" r="14" fill="#00e5c3" fill-opacity="0.07"/>
  <circle cx="154" cy="44" r="9" fill="#00e5c3" fill-opacity="0.75"/>

  <circle cx="28" cy="112" r="14" fill="#8b80ff" fill-opacity="0.08"/>
  <circle cx="28" cy="112" r="8.5" fill="#8b80ff" fill-opacity="0.85"/>

  <circle cx="172" cy="124" r="13" fill="#8b80ff" fill-opacity="0.07"/>
  <circle cx="172" cy="124" r="8" fill="#8b80ff" fill-opacity="0.65"/>

  <circle cx="68" cy="160" r="7" fill="#00e5c3" fill-opacity="0.65"/>
  <circle cx="142" cy="164" r="6.5" fill="#8b80ff" fill-opacity="0.55"/>

  <!-- central node ring -->
  <circle cx="100" cy="100" r="34" fill="none" stroke="url(#ringG)" stroke-width="1.2"/>
  <!-- central node -->
  <circle cx="100" cy="100" r="28" fill="url(#iconG)"/>
  <!-- spark bolt -->
  <path d="M97 82 L91 102 L100 102 L103 118 L109 98 L100 98 L106 82 Z" fill="#06080f" opacity="0.92"/>
</svg>

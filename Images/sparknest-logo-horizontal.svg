<svg width="420" height="80" viewBox="0 0 420 80" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>SparkNest — Light version logo</title>
  <desc>SparkNest horizontal logo adapted for light or white backgrounds</desc>

  <defs>
    <linearGradient id="iconG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5c3"/>
      <stop offset="100%" stop-color="#8b80ff"/>
    </linearGradient>
    <linearGradient id="nestG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00b894"/>
      <stop offset="100%" stop-color="#6c5fff"/>
    </linearGradient>
  </defs>

  <!-- ICON -->
  <g transform="translate(6, 6)">
    <rect width="68" height="68" rx="19" fill="#0d1828"/>
    <line x1="34" y1="34" x2="16" y2="16" stroke="#00e5c3" stroke-width="1.2" stroke-opacity="0.6"/>
    <line x1="34" y1="34" x2="52" y2="16" stroke="#00e5c3" stroke-width="1.2" stroke-opacity="0.5"/>
    <line x1="34" y1="34" x2="10" y2="38" stroke="#8b80ff" stroke-width="1.0" stroke-opacity="0.6"/>
    <line x1="34" y1="34" x2="58" y2="44" stroke="#8b80ff" stroke-width="1.0" stroke-opacity="0.5"/>
    <line x1="34" y1="34" x2="24" y2="56" stroke="#00e5c3" stroke-width="0.9" stroke-opacity="0.45"/>
    <line x1="34" y1="34" x2="50" y2="58" stroke="#8b80ff" stroke-width="0.9" stroke-opacity="0.4"/>
    <circle cx="16" cy="16" r="4.5" fill="#00e5c3" fill-opacity="0.95"/>
    <circle cx="52" cy="16" r="3.8" fill="#00e5c3" fill-opacity="0.75"/>
    <circle cx="10" cy="38" r="3.2" fill="#8b80ff" fill-opacity="0.85"/>
    <circle cx="58" cy="44" r="3.2" fill="#8b80ff" fill-opacity="0.62"/>
    <circle cx="24" cy="56" r="2.6" fill="#00e5c3" fill-opacity="0.62"/>
    <circle cx="50" cy="58" r="2.6" fill="#8b80ff" fill-opacity="0.52"/>
    <circle cx="34" cy="34" r="11" fill="url(#iconG)"/>
    <path d="M32.5 27 L30 34 L33.5 34 L34.5 41 L37.5 33 L34 33 L36.5 27 Z" fill="#06080f" opacity="0.92"/>
  </g>

  <!-- WORDMARK — dark text for light bg -->
  <text x="86" y="36"
    font-family="'Syne', Georgia, serif"
    font-size="32"
    font-weight="800"
    fill="#07101e"
    letter-spacing="-1.2">Spark<tspan fill="url(#nestG)">Nest</tspan></text>

  <!-- TAGLINE -->
  <text x="88" y="58"
    font-family="'Outfit', 'Helvetica Neue', Arial, sans-serif"
    font-size="13"
    font-weight="300"
    fill="#8fa3c0"
    letter-spacing="0.3">Learning tools for curious children</text>

</svg>

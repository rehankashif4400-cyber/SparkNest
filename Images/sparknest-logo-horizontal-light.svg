<svg width="420" height="80" viewBox="0 0 420 80" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>SparkNest — Learning tools for curious children</title>
  <desc>SparkNest horizontal logo with neural spark icon and wordmark</desc>

  <defs>
    <linearGradient id="iconG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5c3"/>
      <stop offset="100%" stop-color="#8b80ff"/>
    </linearGradient>
    <linearGradient id="nestG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5c3"/>
      <stop offset="100%" stop-color="#8b80ff"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5c3" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00e5c3" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ICON — 68x68, vertically centered in 80px height -->
  <g transform="translate(6, 6)">
    <ellipse cx="34" cy="34" rx="46" ry="46" fill="url(#halo)"/>
    <rect width="68" height="68" rx="19" fill="#0d1828" stroke="#1a2840" stroke-width="1"/>
    <!-- edges -->
    <line x1="34" y1="34" x2="16" y2="16" stroke="#00e5c3" stroke-width="1.2" stroke-opacity="0.55"/>
    <line x1="34" y1="34" x2="52" y2="16" stroke="#00e5c3" stroke-width="1.2" stroke-opacity="0.45"/>
    <line x1="34" y1="34" x2="10" y2="38" stroke="#8b80ff" stroke-width="1.0" stroke-opacity="0.55"/>
    <line x1="34" y1="34" x2="58" y2="44" stroke="#8b80ff" stroke-width="1.0" stroke-opacity="0.45"/>
    <line x1="34" y1="34" x2="24" y2="56" stroke="#00e5c3" stroke-width="0.9" stroke-opacity="0.42"/>
    <line x1="34" y1="34" x2="50" y2="58" stroke="#8b80ff" stroke-width="0.9" stroke-opacity="0.38"/>
    <!-- cross connections -->
    <line x1="16" y1="16" x2="52" y2="16" stroke="#00e5c3" stroke-width="0.5" stroke-opacity="0.16"/>
    <line x1="10" y1="38" x2="24" y2="56" stroke="#8b80ff" stroke-width="0.5" stroke-opacity="0.14"/>
    <!-- satellite nodes -->
    <circle cx="16" cy="16" r="4.5" fill="#00e5c3" fill-opacity="0.95"/>
    <circle cx="16" cy="16" r="8" fill="#00e5c3" fill-opacity="0.1"/>
    <circle cx="52" cy="16" r="3.8" fill="#00e5c3" fill-opacity="0.75"/>
    <circle cx="10" cy="38" r="3.2" fill="#8b80ff" fill-opacity="0.85"/>
    <circle cx="58" cy="44" r="3.2" fill="#8b80ff" fill-opacity="0.62"/>
    <circle cx="24" cy="56" r="2.6" fill="#00e5c3" fill-opacity="0.62"/>
    <circle cx="50" cy="58" r="2.6" fill="#8b80ff" fill-opacity="0.52"/>
    <!-- central node ring -->
    <circle cx="34" cy="34" r="15" fill="none" stroke="#00e5c3" stroke-width="0.6" stroke-opacity="0.25"/>
    <!-- central node -->
    <circle cx="34" cy="34" r="11" fill="url(#iconG)"/>
    <!-- spark bolt -->
    <path d="M32.5 27 L30 34 L33.5 34 L34.5 41 L37.5 33 L34 33 L36.5 27 Z" fill="#06080f" opacity="0.92"/>
  </g>

  <!-- WORDMARK — starts at x=86 -->
  <text x="86" y="36"
    font-family="'Syne', Georgia, serif"
    font-size="32"
    font-weight="800"
    fill="#edf2fc"
    letter-spacing="-1.2">Spark<tspan fill="url(#nestG)">Nest</tspan></text>

  <!-- TAGLINE -->
  <text x="88" y="58"
    font-family="'Outfit', 'Helvetica Neue', Arial, sans-serif"
    font-size="13"
    font-weight="300"
    fill="#4d6180"
    letter-spacing="0.3">Learning tools for curious children</text>

</svg>
